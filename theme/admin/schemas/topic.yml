id: topic
label: Topic
typeValue: Topic
outputDir: topics
viewBasePath: /topics
fields:
  - name: track
    label: Track
    input: text
    required: true
    placeholder: Modeling
    width: half
  - name: title
    label: Title
    input: text
    required: true
    placeholder: Retopology
    width: half
  - name: slug
    label: Slug
    input: text
    required: false
    placeholder: retopology
    hint: Leave empty to generate it from the title.
    width: half
  - name: stage
    label: Stage
    input: number
    required: false
    min: 0
    placeholder: "1"
    width: third
  - name: level
    label: Level
    input: number
    required: false
    min: 0
    placeholder: "1"
    width: third
  - name: tags
    label: Tags
    input: tags
    required: false
    placeholder: Workflow, Fundamentals
    hint: Comma-separated list.
    width: third
  - name: description
    label: Description
    input: textarea
    required: true
    rows: 4
    width: full
  - name: content
    label: Content (Markdown)
    input: markdown
    required: false
    rows: 16
    placeholder: "# {{title}}"
    width: full
