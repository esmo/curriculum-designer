id: lesson
label: Lesson
typeValue: Lesson
outputDir: lessons
viewBasePath: /lessons
fields:
  - name: track
    label: Track
    input: text
    required: true
    placeholder: Modeling
    width: half
  - name: title
    label: Titel
    input: text
    required: true
    placeholder: Transforming Objects
    width: half
  - name: slug
    label: Slug
    input: text
    required: false
    placeholder: transforming-objects
    hint: Leer lassen, um ihn aus dem Titel zu erzeugen.
    width: half
  - name: stage
    label: Stage
    input: number
    required: false
    min: 0
    placeholder: "1"
    width: third
  - name: level
    label: Level
    input: number
    required: false
    min: 0
    placeholder: "1"
    width: third
  - name: tags
    label: Tags
    input: tags
    required: false
    placeholder: Geometry Nodes, Theory
    hint: Kommagetrennte Liste.
    width: third
  - name: description
    label: Beschreibung
    input: textarea
    required: true
    rows: 4
    width: full
  - name: content
    label: Inhalt (Markdown)
    input: markdown
    required: false
    rows: 16
    placeholder: "# {{title}}"
    width: full
