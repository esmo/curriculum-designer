id: resource
label: Resource
typeValue: Resource
outputDir: resources
viewBasePath: /resources
fields:
  - name: track
    label: Themenbereich
    input: text
    required: true
    placeholder: Modeling
    width: half
  - name: title
    label: Titel der Lern-Ressource
    input: text
    required: true
    placeholder: Topology for Hard Surface Modeling
    width: half
  - name: slug
    label: Slug
    input: text
    required: false
    placeholder: topology-hard-surface-modeling
    hint: Leer lassen, um ihn aus dem Titel zu erzeugen.
    width: half
  - name: format
    label: Format
    input: select
    required: true
    width: third
    options:
      - Video
      - PDF
      - Artikel
      - Demo-Datei
      - Referenz-Setup
      - Mixed
  - name: level
    label: Niveau
    input: select
    required: true
    width: third
    options:
      - Einsteiger
      - Mittelstufe
      - Fortgeschritten
  - name: source_url
    label: Originalquelle (URL)
    input: text
    required: false
    placeholder: https://example.com/resource
    width: full
  - name: description
    label: Kurzbeschreibung
    input: textarea
    required: true
    rows: 4
    hint: 2-4 Sätze.
    width: full
  - name: author_source
    label: Autor:in / Quelle
    input: text
    required: false
    placeholder: CG Cookie
    width: half
  - name: version
    label: Version / Stand
    input: text
    required: false
    placeholder: Blender 4.2, Stand 2026-03
    width: half
  - name: license
    label: Lizenz / Nutzungsrechte
    input: text
    required: false
    placeholder: CC BY 4.0
    width: full
  - name: core_concepts
    label: Kernkonzepte / Inhalte
    input: markdown
    required: false
    rows: 10
    width: full
  - name: glossary_terms
    label: Kernbegriffe (Glossarbezug)
    input: tags
    required: false
    placeholder: Topology, Quad, Edge Flow
    hint: Kommagetrennte Liste.
    width: full
  - name: learning_goals
    label: Lernziele
    input: markdown
    required: false
    rows: 10
    placeholder: "- kann ..."
    hint: 3-5 beobachtbare Lernziele.
    width: full
  - name: prerequisite_reference
    label: Vorgänger-Ressource
    input: text
    required: false
    placeholder: Intro to Topology (/resources/intro-to-topology/)
    hint: Freitext für Titel, Link oder interne ID.
    width: full
  - name: software_version
    label: Software + Version
    input: text
    required: false
    placeholder: Blender 4.2
    width: half
  - name: addons_plugins
    label: Benötigte Add-ons / Plugins
    input: markdown
    required: false
    rows: 6
    placeholder: "- Node Wrangler"
    width: half
  - name: assets_formats
    label: Dateiformate / Assets
    input: markdown
    required: false
    rows: 6
    placeholder: "- .blend\n- Referenzbilder"
    width: full
